<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <!-- Warm ambient light gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8dfd4"/>
      <stop offset=".35" stop-color="#d4e5ec"/>
      <stop offset=".65" stop-color="#b8d4e2"/>
      <stop offset="1" stop-color="#93bdd4"/>
    </linearGradient>
    <!-- Golden hour warm wash -->
    <linearGradient id="warmWash" x1="0" y1="0" x2="1" y2=".6">
      <stop offset="0" stop-color="#f5e6c8" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#f0d9a8" stop-opacity=".25"/>
      <stop offset="1" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <!-- Floor gradient - premium stone -->
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8bfb0"/>
      <stop offset=".15" stop-color="#d6cfc4"/>
      <stop offset=".5" stop-color="#c9c0b2"/>
      <stop offset="1" stop-color="#b8ad9e"/>
    </linearGradient>
    <!-- Terrace floor -->
    <linearGradient id="terrace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2b8a6"/>
      <stop offset="1" stop-color="#a89d8b"/>
    </linearGradient>
    <!-- Wall surface -->
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0ebe4"/>
      <stop offset="1" stop-color="#e8e1d8"/>
    </linearGradient>
    <!-- Ceiling -->
    <linearGradient id="ceiling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f0ea"/>
      <stop offset="1" stop-color="#ece6dd"/>
    </linearGradient>
    <!-- Glass reflection -->
    <linearGradient id="glassReflect" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".12"/>
      <stop offset=".3" stop-color="#fff" stop-opacity=".04"/>
      <stop offset=".7" stop-color="#fff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#fff" stop-opacity=".02"/>
    </linearGradient>
    <!-- Plissee mesh pattern -->
    <pattern id="plissee" x="0" y="0" width="4" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="8" fill="#c5c0b8" fill-opacity=".15"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="#9e9890" stroke-width=".3" stroke-opacity=".35"/>
      <line x1="0" y1="4" x2="4" y2="4" stroke="#9e9890" stroke-width=".25" stroke-opacity=".25"/>
    </pattern>
    <!-- Fine mesh for insect screen -->
    <pattern id="mesh" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent"/>
      <line x1="0" y1="1.5" x2="3" y2="1.5" stroke="#888" stroke-width=".15" stroke-opacity=".18"/>
      <line x1="1.5" y1="0" x2="1.5" y2="3" stroke="#888" stroke-width=".15" stroke-opacity=".18"/>
    </pattern>
    <!-- Door frame metal gradient -->
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a4a4a"/>
      <stop offset=".3" stop-color="#636363"/>
      <stop offset=".5" stop-color="#707070"/>
      <stop offset=".7" stop-color="#636363"/>
      <stop offset="1" stop-color="#4a4a4a"/>
    </linearGradient>
    <!-- Handle metal -->
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#888"/>
      <stop offset=".4" stop-color="#aaa"/>
      <stop offset=".6" stop-color="#bbb"/>
      <stop offset="1" stop-color="#888"/>
    </linearGradient>
    <!-- Garden foliage -->
    <linearGradient id="garden" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a9e48"/>
      <stop offset=".4" stop-color="#5a8e3c"/>
      <stop offset="1" stop-color="#3d6a28"/>
    </linearGradient>
    <!-- Distant trees -->
    <linearGradient id="treeLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7aae5c"/>
      <stop offset="1" stop-color="#5c8e42"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx=".72" cy=".22" r=".45">
      <stop offset="0" stop-color="#fff8e1" stop-opacity=".6"/>
      <stop offset=".4" stop-color="#f5e6c8" stop-opacity=".25"/>
      <stop offset="1" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <linearGradient id="floorShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity=".08"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <!-- Interior shadow on floor from doors -->
    <linearGradient id="doorShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity=".06"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle floor tile pattern -->
    <pattern id="tiles" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="transparent"/>
      <line x1="0" y1="0" x2="120" y2="0" stroke="#b5aa9a" stroke-width=".4" stroke-opacity=".2"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#b5aa9a" stroke-width=".4" stroke-opacity=".2"/>
    </pattern>
    <!-- Outdoor wooden deck pattern -->
    <pattern id="deck" x="0" y="0" width="200" height="14" patternUnits="userSpaceOnUse">
      <rect width="200" height="14" fill="transparent"/>
      <line x1="0" y1="13" x2="200" y2="13" stroke="#9e8e72" stroke-width=".5" stroke-opacity=".25"/>
    </pattern>
    <!-- Left fade for text overlay area -->
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f0ea" stop-opacity=".65"/>
      <stop offset=".35" stop-color="#f5f0ea" stop-opacity=".3"/>
      <stop offset=".55" stop-color="#f5f0ea" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky / outdoor background -->
  <rect width="1920" height="960" fill="url(#sky)"/>

  <!-- Distant horizon -->
  <rect x="0" y="380" width="1920" height="580" fill="#a5c48a" opacity=".2"/>

  <!-- Distant tree line -->
  <g opacity=".55">
    <ellipse cx="700" cy="340" rx="180" ry="90" fill="#8ab56c"/>
    <ellipse cx="900" cy="350" rx="220" ry="100" fill="#7da85e"/>
    <ellipse cx="1150" cy="330" rx="200" ry="95" fill="#85b065"/>
    <ellipse cx="1400" cy="345" rx="170" ry="85" fill="#7aaa58"/>
    <ellipse cx="1600" cy="338" rx="190" ry="88" fill="#82ad62"/>
    <ellipse cx="500" cy="348" rx="160" ry="80" fill="#7fa860"/>
  </g>

  <!-- Mid-ground garden/lawn through doors -->
  <rect x="400" y="420" width="1520" height="200" fill="url(#garden)" opacity=".45"/>

  <!-- Outdoor terrace deck floor -->
  <g>
    <path d="M400 580 L1920 580 L1920 960 L400 960Z" fill="#c2ad8e"/>
    <path d="M400 580 L1920 580 L1920 960 L400 960Z" fill="url(#deck)"/>
    <path d="M400 580 L1920 580 L1920 960 L400 960Z" fill="#b8a68a" opacity=".15"/>
  </g>

  <!-- Sun glow effect -->
  <rect width="1920" height="960" fill="url(#sunGlow)"/>

  <!-- === INTERIOR ROOM (left portion) === -->

  <!-- Ceiling -->
  <rect x="0" y="0" width="500" height="80" fill="url(#ceiling)"/>

  <!-- Left wall -->
  <rect x="0" y="0" width="80" height="960" fill="url(#wall)"/>
  <rect x="0" y="0" width="80" height="960" fill="#e8e0d5" opacity=".5"/>

  <!-- Interior floor -->
  <path d="M0 620 L650 600 L650 960 L0 960Z" fill="url(#floor)"/>
  <path d="M0 620 L650 600 L650 960 L0 960Z" fill="url(#tiles)"/>

  <!-- Floor light reflection from outside -->
  <rect x="450" y="620" width="350" height="340" fill="#f5e6c8" opacity=".08"/>

  <!-- === SLIDING GLASS DOOR SYSTEM === -->

  <!-- Main door frame - top rail -->
  <rect x="380" y="58" width="1150" height="14" fill="url(#frame)" rx="1"/>

  <!-- Main door frame - bottom rail/track -->
  <rect x="380" y="598" width="1150" height="16" fill="url(#frame)" rx="1"/>

  <!-- Left wall pillar/frame -->
  <rect x="375" y="55" width="18" height="564" fill="url(#frame)" rx="1"/>

  <!-- Right wall pillar/frame -->
  <rect x="1517" y="55" width="18" height="564" fill="url(#frame)" rx="1"/>

  <!-- Center divider frame -->
  <rect x="940" y="58" width="12" height="556" fill="url(#frame)" rx="0.5"/>

  <!-- === LEFT DOOR PANEL (with plissee insect screen) === -->

  <!-- Glass pane left -->
  <rect x="393" y="72" width="547" height="526" fill="#c7dce8" opacity=".18"/>
  <rect x="393" y="72" width="547" height="526" fill="url(#glassReflect)"/>

  <!-- Plissee insect screen on left door - partially open, showing accordion folds -->
  <g opacity=".88">
    <!-- Plissee frame -->
    <rect x="393" y="72" width="180" height="526" fill="#d8d3ca" opacity=".4"/>
    <rect x="393" y="72" width="180" height="526" fill="url(#plissee)"/>

    <!-- Accordion fold lines for plissee -->
    <g stroke="#a09888" stroke-opacity=".3" stroke-width=".6">
      <line x1="408" y1="72" x2="408" y2="598"/>
      <line x1="423" y1="72" x2="423" y2="598"/>
      <line x1="438" y1="72" x2="438" y2="598"/>
      <line x1="453" y1="72" x2="453" y2="598"/>
      <line x1="468" y1="72" x2="468" y2="598"/>
      <line x1="483" y1="72" x2="483" y2="598"/>
      <line x1="498" y1="72" x2="498" y2="598"/>
      <line x1="513" y1="72" x2="513" y2="598"/>
      <line x1="528" y1="72" x2="528" y2="598"/>
      <line x1="543" y1="72" x2="543" y2="598"/>
      <line x1="558" y1="72" x2="558" y2="598"/>
    </g>

    <!-- Plissee side frame/guide rail -->
    <rect x="393" y="72" width="5" height="526" fill="#7a7570" opacity=".5"/>
    <rect x="570" y="72" width="4" height="526" fill="#7a7570" opacity=".35"/>
  </g>

  <!-- Visible garden through left door glass (clear part) -->
  <g clip-path="url(#leftDoorClip)" opacity=".1">
    <rect x="574" y="72" width="366" height="526" fill="#8ab56c"/>
  </g>

  <!-- Door handle left panel -->
  <rect x="918" y="310" width="10" height="50" rx="3" fill="url(#handle)"/>
  <rect x="918" y="310" width="10" height="50" rx="3" fill="#bbb" opacity=".3"/>

  <!-- === RIGHT DOOR PANEL (with fine mesh insect screen) === -->

  <!-- Glass pane right -->
  <rect x="952" y="72" width="565" height="526" fill="#c7dce8" opacity=".14"/>
  <rect x="952" y="72" width="565" height="526" fill="url(#glassReflect)"/>

  <!-- Fine mesh insect screen on right door - fully extended -->
  <g opacity=".75">
    <rect x="952" y="72" width="565" height="526" fill="url(#mesh)"/>
    <!-- Subtle mesh tint -->
    <rect x="952" y="72" width="565" height="526" fill="#a0a0a0" opacity=".06"/>
  </g>

  <!-- View through mesh - slightly muted garden -->
  <g opacity=".35">
    <ellipse cx="1200" cy="350" rx="160" ry="80" fill="#7aaa58"/>
    <ellipse cx="1380" cy="360" rx="120" ry="65" fill="#6a9a4a"/>
  </g>

  <!-- Door handle right panel -->
  <rect x="963" y="310" width="10" height="50" rx="3" fill="url(#handle)"/>
  <rect x="963" y="310" width="10" height="50" rx="3" fill="#bbb" opacity=".3"/>

  <!-- === ADDITIONAL ARCHITECTURAL DETAILS === -->

  <!-- Thin bottom track detail -->
  <rect x="393" y="600" width="1124" height="2" fill="#888" opacity=".3"/>

  <!-- Floor threshold strip -->
  <rect x="380" y="614" width="1155" height="5" fill="#8a8278" opacity=".4" rx="1"/>

  <!-- Interior floor shadow from door frame -->
  <rect x="380" y="620" width="270" height="80" fill="url(#doorShadow)" opacity=".5"/>

  <!-- Light beam on interior floor from open door -->
  <polygon points="574,620 940,620 870,960 450,960" fill="#f5e6c8" opacity=".06"/>

  <!-- === INTERIOR FURNISHING HINTS === -->

  <!-- Minimalist plant (left side) -->
  <g opacity=".6" transform="translate(140, 430)">
    <!-- Pot -->
    <rect x="-18" y="120" width="36" height="48" rx="4" fill="#c4b8a4"/>
    <rect x="-20" y="116" width="40" height="8" rx="2" fill="#b8aa96"/>
    <!-- Plant stems -->
    <line x1="0" y1="116" x2="-12" y2="50" stroke="#5a8a3c" stroke-width="2.5"/>
    <line x1="0" y1="116" x2="8" y2="40" stroke="#5a8a3c" stroke-width="2.5"/>
    <line x1="0" y1="116" x2="-3" y2="30" stroke="#5a8a3c" stroke-width="2"/>
    <!-- Leaves -->
    <ellipse cx="-18" cy="42" rx="16" ry="8" fill="#6a9e48" transform="rotate(-25 -18 42)"/>
    <ellipse cx="14" cy="34" rx="14" ry="7" fill="#5a8e3c" transform="rotate(20 14 34)"/>
    <ellipse cx="-6" cy="24" rx="13" ry="6.5" fill="#72a650" transform="rotate(-10 -6 24)"/>
    <ellipse cx="-22" cy="60" rx="12" ry="6" fill="#6a9e48" transform="rotate(-35 -22 60)"/>
    <ellipse cx="10" cy="55" rx="11" ry="5.5" fill="#5c9040" transform="rotate(15 10 55)"/>
  </g>

  <!-- Subtle wall art / minimal frame (left side) -->
  <g opacity=".25">
    <rect x="120" y="140" width="100" height="130" rx="2" fill="none" stroke="#a09888" stroke-width="1.5"/>
    <rect x="130" y="150" width="80" height="110" fill="#e5ddd2"/>
  </g>

  <!-- === RIGHT SIDE: OUTDOOR TERRACE DETAILS === -->

  <!-- Modern outdoor furniture silhouette (far right) -->
  <g opacity=".4" transform="translate(1620, 490)">
    <!-- Low modern table -->
    <rect x="0" y="60" width="120" height="6" rx="2" fill="#8a7e6a"/>
    <rect x="8" y="66" width="4" height="30" fill="#7a7060"/>
    <rect x="108" y="66" width="4" height="30" fill="#7a7060"/>
    <!-- Chair back -->
    <rect x="140" y="20" width="60" height="76" rx="6" fill="#8a7e6a" opacity=".5"/>
    <rect x="140" y="66" width="60" height="6" rx="2" fill="#8a7e6a"/>
    <rect x="145" y="72" width="4" height="24" fill="#7a7060"/>
    <rect x="191" y="72" width="4" height="24" fill="#7a7060"/>
  </g>

  <!-- Potted plant on terrace -->
  <g opacity=".5" transform="translate(1560, 520)">
    <rect x="-14" y="40" width="28" height="38" rx="4" fill="#9e9080"/>
    <ellipse cx="0" cy="30" rx="22" ry="18" fill="#6a9e48"/>
    <ellipse cx="-10" cy="22" rx="14" ry="12" fill="#5a8e3c"/>
    <ellipse cx="8" cy="25" rx="12" ry="10" fill="#72a650"/>
  </g>

  <!-- === LIGHTING & ATMOSPHERE === -->

  <!-- Warm golden wash over entire scene -->
  <rect width="1920" height="960" fill="url(#warmWash)"/>

  <!-- Soft vignette bottom -->
  <rect x="0" y="700" width="1920" height="260" fill="#000" opacity=".03"/>

  <!-- Left side subtle warm tint (where text goes) -->
  <rect x="0" y="0" width="700" height="960" fill="url(#leftFade)"/>

  <!-- Very subtle grain texture overlay for realism -->
  <rect width="1920" height="960" fill="#f5efe5" opacity=".04"/>
</svg>